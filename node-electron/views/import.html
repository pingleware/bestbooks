<!-- Import -->
<div id="import-panel" class="w3-container" style="display:none;">
    <br/><br/><br/>
    <h2 class="w3-yellow">Import:</h2>
    <button class="w3-button w3-block w3-orange" id="import-panel-back">Back</button>
    <br/>
        <label for="import-panel-source">Source</label>
    <select id="import-panel-source" class="w3-input w3-block">
        <option value="">Select</option>
        <optgroup label="Wave Accounting">
            <option value="wave_accounting">Accounting</option>
            <option value="wave_bill_items">Bill Items</option>
            <option value="wave_customers">Customers</option>
            <option value="wave_vendors">Vendors</option>    
        </optgroup>
    </select>
    <label for="import-panel-file">File</label>
    <input type="file" id="import-panel-file" class="w3-input w3-block" value="" />
    <br/>
    <button id="import-panel-submit" class="w3-button w3-block w3-black">Submit</button>
    <br/><br/><br/>
</div>
<!-- Progress Dialog -->
<div id="progress-dialog" class="w3-modal">
    <div class="w3-modal-content">
        <div class="w3-container w3-white">
            <h2 class="w3-green" id="progress-dialog-title">Progress</h2>
            <div class="w3-border">
                <div class="w3-green" style="height:24px;width:0%" id="progrss-dialog-bar"></div>
            </div>
            <br/>
        </div>
    </div>
</div>
