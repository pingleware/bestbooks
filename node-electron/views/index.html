<!DOCTYPE html>
<html lang="en">
    <head>
        <title>BestBooks&trade; Accounting Application Franework</title>
        <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width">
        <link rel="stylesheet" type="text/css" href="css/index.css">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
    </head>
    <body>
        <!-- Header -->
        <div class="w3-container w3-blue w3-top">
            <h4>BestBooks<sup>&trade;</sup> Accounting Application Framework</h4>
        </div>
        <!-- Main Panel -->
        <div class="w3-container" id="main">
            <br/><br/><br/>
            <fieldset>
                <legend>Sales</legend>
            </fieldset>
            <fieldset>
                <legend>Purchases</legend>
            </fieldset>
            <fieldset>
                <legend>Inventory</legend>
            </fieldset>
            <fieldset>
                <legend>Accounting</legend>
            </fieldset>
            <fieldset>
                <legend>Payroll</legend>
            </fieldset>
            <fieldset>
                <legend>Reports</legend>
            </fieldset>
            <fieldset>
                <legend>Settings</legend>
            </fieldset>
            <fieldset>
                <legend>Help</legend>
            </fieldset>
            <br/><br/><br/>
        </div>
        <!-- SUCCESS DIALOG -->
        <div id="success-dialog" class="w3-modal">
            <div class="w3-modal-content">
            <div class="w3-container">
                <h2 class="w3-green" id="success-dialog-title">Success</h2>
                <p id="success-dialog-message"></p>
                <br />
                <button class="w3-button w3-block w3-black" onclick="document.getElementById('success-dialog').style.display='none';">OK</button>
                <br />
            </div>
            </div>
        </div>
        <!-- ERROR DIALOG -->
        <div id="error-dialog" class="w3-modal">
            <div class="w3-modal-content">
            <div class="w3-container">
                <h2 class="w3-red" id="error-dialog-title">Error</h2>
                <p id="error-dialog-message"></p>
                <br />
                <button class="w3-button w3-block w3-black" id="error-dialog-ok" onclick="document.getElementById('error-dialog').style.display='none';">OK</button>
                <br />
            </div>
            </div>
        </div>
        <!-- CONFIRM DIALOG -->
        <div id="confirm-dialog" class="w3-modal">
            <div class="w3-modal-content">
            <div class="w3-container">
                <h2 class="w3-red" id="confirm-dialog-title">Error</h2>
                <p id="confirm-dialog-message"></p>
                <br />
                <button class="w3-button w3-block w3-light-grey" id="confirm-dialog-yes">Yes</button>
                <br />
                <button class="w3-button w3-block w3-light-grey" onclick="document.getElementById('confirm-dialog').style.display='none';">No</button>
                <br />
            </div>
            </div>
        </div>        
        <!-- Footer -->
        <div class="w3-container w3-card w3-blue w3-bottom">
            <p class="w3-center">
                &copy; <span id="year">2022</span>&nbsp;<a href="https://presspage.info" target="_blank" style="text-decoration: none;">PressPage Entertainment Inc</a> DBA <a href="https://pingleware.work" target="_blank" style="text-decoration:none;">PINGLEWARE</a>
                &nbsp;All rights reserved.
                &nbsp;<span class="w3-tiny" id="version"></span>
            </p>
        </div>        
        <!-- JavaScript -->
        <script type="text/javascript">
            window.onload = function() {
                document.getElementById('version').innerHTML = 'Version ' + localStorage.getItem('version');

                var year = new Date().getFullYear();
                if (year > 2022) {
                    document.getElementById('year').innerHTML = `2022-${year}`;
                } else {
                    document.getElementById('year').innerHTML = year;
                }
            }
        </script>
    </body>
</html>
